name: docs-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.json
          globs: |
            **/*.md
            #node_modules

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Folded string: one space-separated arg list for the lychee binary.
          # Note: do not use --exclude-mail; it was removed in lychee 0.23 (mail is off by default).
          args: >-
            --no-progress
            --exclude-loopback
            --exclude-private
            --exclude ^https?://localhost
            --exclude ^https?://127\.0\.0\.1
            --exclude ^s3://
            --exclude ^hdfs://
            --exclude ^file:
            './**/*.md'
          fail: true

  python-syntax:
    name: Python syntax (py_compile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all Python under examples/
        run: |
          set -euo pipefail
          if compgen -G "examples/**/*.py" > /dev/null; then
            python -m compileall -q examples
          else
            echo "No Python files under examples/, skipping."
          fi

  shell-check:
    name: Shell script syntax and shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          fail=0
          for f in **/*.sh; do
            echo "Checking $f"
            if ! bash -n "$f"; then
              fail=1
            fi
          done
          exit "$fail"

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          fail=0
          for f in **/*.sh; do
            echo "shellcheck $f"
            shellcheck "$f" || fail=1
          done
          exit "$fail"
